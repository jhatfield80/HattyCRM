# HattyCRM Production Docker Compose
# Prehistoric Inc. — Multi-Workspace CRM Deployment
#
# USAGE:
#   1. Copy .env.hattycrm to .env  (cp .env.hattycrm .env)
#   2. Fill in all CHANGE_ME values in .env
#   3. Run:  docker compose up -d
#   4. Open: http://your-server-ip:3000  (or your domain if using reverse proxy)

name: hattycrm

services:
  server:
      image: twentycrm/twenty:${TAG:-latest}
          container_name: hattycrm-server
              volumes:
                    - server-local-data:/app/packages/twenty-server/.local-storage
                        ports:
                              - "3000:3000"
                                  environment:
                                        NODE_PORT: 3000
                                              PG_DATABASE_URL: postgres://${PG_DATABASE_USER:-hattycrm}:${PG_DATABASE_PASSWORD}@db:5432/hattycrm
                                                    SERVER_URL: ${SERVER_URL}
                                                          REDIS_URL: redis://redis:6379

                                                                # Security
                                                                      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
                                                                            APP_SECRET: ${APP_SECRET}

                                                                                  # Multi-workspace (required for Prehistoric Inc. subsidiaries)
                                                                                        IS_MULTIWORKSPACE_ENABLED: "true"
                                                                                              IS_WORKSPACE_CREATION_LIMITED_TO_SERVER_ADMINS: "true"

                                                                                                    # Storage
                                                                                                          STORAGE_TYPE: ${STORAGE_TYPE:-local}
                                                                                                                STORAGE_S3_REGION: ${STORAGE_S3_REGION:-}
                                                                                                                      STORAGE_S3_NAME: ${STORAGE_S3_NAME:-}
                                                                                                                            STORAGE_S3_ENDPOINT: ${STORAGE_S3_ENDPOINT:-}
                                                                                                                            
                                                                                                                                  # Email
                                                                                                                                        EMAIL_FROM_ADDRESS: ${EMAIL_FROM_ADDRESS:-}
                                                                                                                                              EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-HattyCRM}
                                                                                                                                                    EMAIL_DRIVER: ${EMAIL_DRIVER:-LOGGER}
                                                                                                                                                          EMAIL_SMTP_HOST: ${EMAIL_SMTP_HOST:-}
                                                                                                                                                                EMAIL_SMTP_PORT: ${EMAIL_SMTP_PORT:-587}
                                                                                                                                                                      EMAIL_SMTP_USER: ${EMAIL_SMTP_USER:-}
                                                                                                                                                                            EMAIL_SMTP_PASSWORD: ${EMAIL_SMTP_PASSWORD:-}
                                                                                                                                                                            
                                                                                                                                                                                  # Admin panel access
                                                                                                                                                                                        SIGN_IN_PREFILLED: "false"
                                                                                                                                                                                        
                                                                                                                                                                                            depends_on:
                                                                                                                                                                                                  db:
                                                                                                                                                                                                          condition: service_healthy
                                                                                                                                                                                                                redis:
                                                                                                                                                                                                                        condition: service_healthy
                                                                                                                                                                                                                            healthcheck:
                                                                                                                                                                                                                                  test: curl --fail http://localhost:3000/healthz
                                                                                                                                                                                                                                        interval: 10s
                                                                                                                                                                                                                                              timeout: 5s
                                                                                                                                                                                                                                                    retries: 20
                                                                                                                                                                                                                                                        restart: always
                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                          worker:
                                                                                                                                                                                                                                                              image: twentycrm/twenty:${TAG:-latest}
                                                                                                                                                                                                                                                                  container_name: hattycrm-worker
                                                                                                                                                                                                                                                                      volumes:
                                                                                                                                                                                                                                                                            - server-local-data:/app/packages/twenty-server/.local-storage
                                                                                                                                                                                                                                                                                command: ["yarn", "worker:prod"]
                                                                                                                                                                                                                                                                                    environment:
                                                                                                                                                                                                                                                                                          PG_DATABASE_URL: postgres://${PG_DATABASE_USER:-hattycrm}:${PG_DATABASE_PASSWORD}@db:5432/hattycrm
                                                                                                                                                                                                                                                                                                SERVER_URL: ${SERVER_URL}
                                                                                                                                                                                                                                                                                                      REDIS_URL: redis://redis:6379
                                                                                                                                                                                                                                                                                                            DISABLE_DB_MIGRATIONS: "true"
                                                                                                                                                                                                                                                                                                                  DISABLE_CRON_JOBS_REGISTRATION: "true"
                                                                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                                                                        ENCRYPTION_KEY: ${ENCRYPTION_KEY}
                                                                                                                                                                                                                                                                                                                              APP_SECRET: ${APP_SECRET}
                                                                                                                                                                                                                                                                                                                                    IS_MULTIWORKSPACE_ENABLED: "true"
                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                          STORAGE_TYPE: ${STORAGE_TYPE:-local}
                                                                                                                                                                                                                                                                                                                                                STORAGE_S3_REGION: ${STORAGE_S3_REGION:-}
                                                                                                                                                                                                                                                                                                                                                      STORAGE_S3_NAME: ${STORAGE_S3_NAME:-}
                                                                                                                                                                                                                                                                                                                                                            STORAGE_S3_ENDPOINT: ${STORAGE_S3_ENDPOINT:-}
                                                                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                                                                  EMAIL_FROM_ADDRESS: ${EMAIL_FROM_ADDRESS:-}
                                                                                                                                                                                                                                                                                                                                                                        EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-HattyCRM}
                                                                                                                                                                                                                                                                                                                                                                              EMAIL_DRIVER: ${EMAIL_DRIVER:-LOGGER}
                                                                                                                                                                                                                                                                                                                                                                                    EMAIL_SMTP_HOST: ${EMAIL_SMTP_HOST:-}
                                                                                                                                                                                                                                                                                                                                                                                          EMAIL_SMTP_PORT: ${EMAIL_SMTP_PORT:-587}
                                                                                                                                                                                                                                                                                                                                                                                                EMAIL_SMTP_USER: ${EMAIL_SMTP_USER:-}
                                                                                                                                                                                                                                                                                                                                                                                                      EMAIL_SMTP_PASSWORD: ${EMAIL_SMTP_PASSWORD:-}
                                                                                                                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                                                                                                          depends_on:
                                                                                                                                                                                                                                                                                                                                                                                                                db:
                                                                                                                                                                                                                                                                                                                                                                                                                        condition: service_healthy
                                                                                                                                                                                                                                                                                                                                                                                                                              server:
                                                                                                                                                                                                                                                                                                                                                                                                                                      condition: service_healthy
                                                                                                                                                                                                                                                                                                                                                                                                                                          restart: always
                                                                                                                                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                                                                                                                                            db:
                                                                                                                                                                                                                                                                                                                                                                                                                                                image: postgres:16
                                                                                                                                                                                                                                                                                                                                                                                                                                                    container_name: hattycrm-db
                                                                                                                                                                                                                                                                                                                                                                                                                                                        volumes:
                                                                                                                                                                                                                                                                                                                                                                                                                                                              - db-data:/var/lib/postgresql/data
                                                                                                                                                                                                                                                                                                                                                                                                                                                                  environment:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                        POSTGRES_DB: hattycrm
                                                                                                                                                                                                                                                                                                                                                                                                                                                                              POSTGRES_PASSWORD: ${PG_DATABASE_PASSWORD}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    POSTGRES_USER: ${PG_DATABASE_USER:-hattycrm}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        healthcheck:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              test: pg_isready -U ${PG_DATABASE_USER:-hattycrm} -h localhost -d hattycrm
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    interval: 5s
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          timeout: 5s
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                retries: 10
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    restart: always
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      redis:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          image: redis:7-alpine
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              container_name: hattycrm-redis
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  restart: always
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      command: ["--maxmemory-policy", "noeviction"]
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          healthcheck:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                test: ["CMD", "redis-cli", "ping"]
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      interval: 5s
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            timeout: 5s
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  retries: 10
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  volumes:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    db-data:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        name: hattycrm-db-data
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          server-local-data:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              name: hattycrm-server-data
